name: Default Workflow
on:
  push:
  pull_request:
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Lint Typescript
        run: npm run lint
      - name: Lint CSS
        run: npm run lint:css  
      - name: Build application
        run: npm run build
